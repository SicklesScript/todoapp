services:
  - type: web
    name: sicklesscript
    env: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/sicklesscript-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: JPA_DDL_AUTO
        value: update
      - key: H2_CONSOLE_ENABLED
        value: "false"
