<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title} + ' | SicklesScript'">SicklesScript</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<main class="terminal">
    <header class="header">
        <h1 th:text="${post.title}">Post title</h1>
        <a class="btn" th:href="@{/posts}">Back</a>
    </header>

    <section class="card">
        <p class="meta">
            Created:
            <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">time</span>
            |
            Updated:
            <span th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">time</span>
        </p>
        <article class="content" th:text="${post.content}"></article>
        <div class="actions">
            <a class="btn" th:href="@{'/posts/' + ${post.id} + '/edit'}">Edit</a>
            <form th:action="@{'/posts/' + ${post.id} + '/delete'}" method="post">
                <button class="btn danger" type="submit">Delete</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
